name: Setup Python
description: Setup Python with pip cache and install dependencies.

inputs:
  python-version:
    description: Python version
    required: false
    default: "3.12"
  requirements:
    description: Path to requirements file relative to backend/
    required: false
    default: "requirements.txt"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: backend/${{ inputs.requirements }}

    - name: Install dependencies
      shell: bash
      working-directory: backend
      run: pip install -r ${{ inputs.requirements }}
