name: PR Pipeline

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: "Frontend: Build & Test"
    if: ${{ hashFiles('frontend/package.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run --reporter=default --reporter=github-actions --reporter=junit --outputFile=test-results/junit.xml

      - name: Test summary
        if: always()
        run: |
          if [ -f test-results/junit.xml ]; then
            tests=$(grep -o 'tests="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*')
            failures=$(grep -o 'failures="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*')
            time=$(grep -o 'time="[0-9.]*"' test-results/junit.xml | head -1 | grep -o '[0-9.]*')
            passed=$((${tests:-0} - ${failures:-0}))
            if [ "${failures:-0}" = "0" ]; then
              echo "### Frontend Tests" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### Frontend Tests (failures)" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "| Tests | Passed | Failed | Duration |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|--------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| ${tests:-0} | ${passed} | ${failures:-0} | ${time:-?}s |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 30

  backend:
    name: "Backend: Build & Test"
    if: ${{ hashFiles('backend/manage.py') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          requirements: requirements-test.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
        run: python manage.py makemigrations --check --dry-run --settings=config.settings_test

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          TEST_OUTPUT_DIR: test-results
        run: >
          python manage.py test
          --settings=config.settings_test
          --testrunner=xmlrunner.extra.djangotestrunner.XMLTestRunner
          --no-input
          -v 2

      - name: Test summary
        if: always()
        run: |
          total=0
          failures=0
          errors=0
          for xml in test-results/*.xml; do
            [ -f "$xml" ] || continue
            t=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
            f=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
            e=$(grep -o 'errors="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
            total=$((total + ${t:-0}))
            failures=$((failures + ${f:-0}))
            errors=$((errors + ${e:-0}))
          done
          failed=$((failures + errors))
          passed=$((total - failed))
          if [ "$failed" = "0" ]; then
            echo "### Backend Tests" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Backend Tests (failures)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Tests | Passed | Failed | Errors |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${total} | ${passed} | ${failures} | ${errors} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: backend-test-results
          path: backend/test-results/
          retention-days: 30

  docker:
    name: "Docker: Build & Logs"
    if: >-
      ${{
        hashFiles('docker-compose.yml') != '' &&
        (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
        (needs.backend.result == 'success' || needs.backend.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create .env if template exists
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            sed -i 's/LOG_FORMAT=text/LOG_FORMAT=json/' .env || true
            sed -i 's/LOG_LEVEL=DEBUG/LOG_LEVEL=INFO/' .env || true
          fi

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p docker-logs
          for service in backend frontend db; do
            container_id=$(docker compose ps -q "$service" 2>/dev/null || true)
            if [ -n "$container_id" ]; then
              docker logs "$container_id" > "docker-logs/${service}.log" 2>&1 || true
            fi
          done

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: docker-logs
          path: docker-logs/
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v
